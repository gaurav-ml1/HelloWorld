name: Terraform Demo
on: push
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps: 
      - name: Code Checkout
        uses: action/checkout@v2
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.12.2
      - name: Terraform Init
        run: terraform init
      - name: Terraform Plan
        run: terraform plan
      - name: Terraform Apply
        run: terraform apply -auto-approve